name: Industrial Launch (PyPI + Release)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.6.2)'
        required: true
        type: string

permissions:
  id-token: write      # Required for PyPI OIDC Handshake
  contents: write      # Required for GitHub Release

jobs:
  build-and-publish:
    name: Industrial Build & Publish
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build SOTA Artifacts
        run: |
          uv build
          # Heritage support for legacy MCPB
          if [ -d "mcpb" ]; then
            zip -r dist/schip-mcp-filesystem.mcpb mcpb/ -x "*.git*"
          fi

      - name: Generate Changelog
        id: changelog
        run: |
          if git describe --tags --abbrev=0 HEAD^ >/dev/null 2>&1; then
            PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^)
            CHANGELOG=$(git log --pretty=format:"- %s" $PREVIOUS_TAG..HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --reverse)
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publish to PyPI (OIDC)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1
        # No password field! OIDC authentication is handled by the id-token permission.

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "schip-mcp-filesystem ${{ github.ref_name }}"
          body: |
            ## 🚀 Industrial Launch: ${{ github.ref_name }}
            
            This release is distributed via PyPI for universal **Zero-Install** support.

            ### ⚡ Quick Start (Zero-Install)
            ```powershell
            uvx schip-mcp-filesystem --serve
            ```

            ### 📖 What's New
            ${{ steps.changelog.outputs.notes }}

            ---
            *Built by Antigravity SOTA Fleet Orchestration*
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.mcpb
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
